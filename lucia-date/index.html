<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lucia &amp; Tino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-1:#ffe4ef;
    --pink-2:#ffc1dd;
    --pink-3:#ff8fc1;
    --pink-4:#ff5fa3;
    --pink-deep:#e2377f;
    --white:#fffafc;
    --shadow:0 20px 45px rgba(226,55,127,.25);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    width:100%;
    overflow-x:hidden;
  }
  body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,var(--pink-1),var(--pink-2) 45%,var(--pink-3) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    min-height:100vh;
    min-height:100dvh;
    overflow-y:auto;
    padding:20px 0;
  }

  /* floating hearts background */
  .bg-hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .heart-particle{
    position:absolute;
    bottom:-10%;
    color:rgba(255,255,255,.55);
    animation:floatUp linear forwards;
    user-select:none;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:.8; }
    100%{ transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
  }

  .app{
    position:relative;
    z-index:2;
    width:100%;
    max-width:560px;
    padding:24px;
  }

  .screen{
    display:none;
    animation:fadeIn .6s ease;
  }
  .screen.active{ display:block; }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(18px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .card{
    background:var(--white);
    border-radius:28px;
    padding:44px 36px;
    box-shadow:var(--shadow);
    text-align:center;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.6);
  }
  .card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:160px; height:160px;
    background:radial-gradient(circle,var(--pink-2),transparent 70%);
    border-radius:50%;
    opacity:.7;
  }
  .card::after{
    content:"";
    position:absolute;
    bottom:-70px; left:-70px;
    width:180px; height:180px;
    background:radial-gradient(circle,var(--pink-1),transparent 70%);
    border-radius:50%;
    opacity:.8;
  }

  .script-font{
    font-family:'Great Vibes', cursive;
    color:var(--pink-deep);
    font-size:2.6rem;
    line-height:1.25;
    margin:0 0 8px;
    position:relative;
    z-index:1;
    text-shadow:0 2px 12px rgba(226,55,127,.25);
  }
  h2.script-font{ font-size:2.2rem; }

  .heart{
    color:var(--pink-4);
    display:inline-block;
    animation:pulseHeart 1.2s ease-in-out infinite;
  }
  @keyframes pulseHeart{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.25); }
  }

  .subtext{
    color:#b85a86;
    font-size:1.05rem;
    margin:6px 0 26px;
    position:relative;
    z-index:1;
  }

  /* question screen dodge area */
  .dodge-zone{
    position:relative;
    width:100%;
    height:clamp(170px, 32vh, 220px);
    margin-top:18px;
  }

  .btn{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:1.05rem;
    padding:16px 38px;
    border-radius:50px;
    border:none;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, left .12s ease-out, top .12s ease-out;
    outline:none;
  }
  .btn-yes{
    position:absolute;
    background:linear-gradient(135deg,var(--pink-4),var(--pink-deep));
    color:#fff;
    box-shadow:0 12px 28px rgba(226,55,127,.45);
    z-index:3;
  }
  .btn-yes:hover{ transform:scale(1.08); }
  .btn-yes:active{ transform:scale(.97); }

  .btn-no{
    position:fixed;
    background:#fff;
    color:var(--pink-deep);
    border:2px solid var(--pink-3);
    z-index:60;
    transition:transform .18s ease, box-shadow .18s ease, left .15s ease-out, top .15s ease-out;
  }

  .hint{
    min-height:24px;
    color:#c9689e;
    font-style:italic;
    font-size:.95rem;
    margin-top:10px;
    position:relative;
    z-index:1;
  }

  .btn-primary{
    background:linear-gradient(135deg,var(--pink-4),var(--pink-deep));
    color:#fff;
    box-shadow:0 12px 28px rgba(226,55,127,.45);
    margin-top:22px;
    position:relative;
    z-index:1;
  }
  .btn-primary:hover:not(:disabled){ transform:translateY(-2px) scale(1.03); }
  .btn-primary:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .date-input{
    font-family:'Poppins',sans-serif;
    font-size:1.1rem;
    padding:14px 20px;
    border-radius:16px;
    border:2px solid var(--pink-2);
    color:var(--pink-deep);
    background:#fff8fb;
    outline:none;
    position:relative;
    z-index:1;
    margin-top:6px;
    width:80%;
    max-width:280px;
  }
  .date-input:focus{ border-color:var(--pink-4); }

  .event-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin:26px 0 8px;
    position:relative;
    z-index:1;
  }
  .event-card{
    font-family:'Poppins',sans-serif;
    background:#fff5f9;
    border:2px solid var(--pink-2);
    border-radius:18px;
    padding:18px 8px;
    font-size:1.7rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    cursor:pointer;
    transition:all .2s ease;
    color:var(--pink-deep);
  }
  .event-card span{
    font-size:.82rem;
    font-weight:600;
    color:#b85a86;
  }
  .event-card:hover{ transform:translateY(-3px); border-color:var(--pink-3); }
  .event-card.selected{
    background:linear-gradient(135deg,var(--pink-4),var(--pink-deep));
    border-color:var(--pink-deep);
    box-shadow:0 10px 22px rgba(226,55,127,.4);
  }
  .event-card.selected span{ color:#fff; }

  .final-card .script-font{ font-size:2.4rem; }
  .names{
    font-family:'Great Vibes', cursive;
    font-size:2.8rem;
    color:var(--pink-deep);
    margin:8px 0 18px;
    position:relative;
    z-index:1;
  }
  .summary{
    color:#b85a86;
    font-size:1.05rem;
    position:relative;
    z-index:1;
  }

  @media (max-width:480px){
    .card{ padding:34px 22px; }
    .script-font{ font-size:1.8rem; }
    .names{ font-size:2.3rem; }
    .event-grid{ grid-template-columns:repeat(2,1fr); }
    .btn-yes, .btn-no{ padding:13px 26px; font-size:.95rem; }
  }
</style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div class="app" id="app">

  <section class="screen active" id="screen-question">
    <div class="card">
      <h1 class="script-font">Will you go out on a date with me Lucia <span class="heart">&#9829;</span></h1>
      <div class="dodge-zone" id="dodgeZone">
        <button class="btn btn-yes" id="yesBtn">Yes</button>
        <button class="btn btn-no" id="noBtn" tabindex="-1">No</button>
      </div>
      <p class="hint" id="hint">&nbsp;</p>
    </div>
  </section>

  <section class="screen" id="screen-yey">
    <div class="card">
      <h1 class="script-font">Yey! You said Yes <span class="heart">&#9829;</span></h1>
      <p class="subtext">I can't wait for this &#128149;</p>
      <button class="btn btn-primary" id="toDateBtn">Continue</button>
    </div>
  </section>

  <section class="screen" id="screen-date">
    <div class="card">
      <h2 class="script-font">Pick our date <span class="heart">&#9829;</span></h2>
      <p class="subtext">When shall I pick you up?</p>
      <input type="date" id="dateInput" class="date-input" />
      <br/>
      <button class="btn btn-primary" id="toEventBtn" disabled>Next</button>
    </div>
  </section>

  <section class="screen" id="screen-event">
    <div class="card">
      <h2 class="script-font">Choose our activity <span class="heart">&#9829;</span></h2>
      <p class="subtext">What shall we do?</p>
      <div class="event-grid" id="eventGrid">
        <button class="event-card" data-event="Dinner">&#127869;<span>Dinner</span></button>
        <button class="event-card" data-event="Movie">&#127916;<span>Movie</span></button>
        <button class="event-card" data-event="Romantic Walk">&#127753;<span>Romantic Walk</span></button>
        <button class="event-card" data-event="Golf">&#9971;<span>Golf</span></button>
        <button class="event-card" data-event="Picnic">&#127820;<span>Picnic</span></button>
      </div>
      <button class="btn btn-primary" id="lockInBtn" disabled>Lock In</button>
    </div>
  </section>

  <section class="screen" id="screen-final">
    <div class="card final-card">
      <h1 class="script-font">Romantic date set <span class="heart">&#9829;</span></h1>
      <p class="names">Lucia <span class="heart">&#9829;</span> Tino</p>
      <p class="summary" id="summaryText"></p>
    </div>
  </section>

</div>

<script>
  // ---------- floating hearts background ----------
  const bgHearts = document.getElementById('bgHearts');
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'heart-particle';
    h.innerHTML = '&#9829;';
    const size = 14 + Math.random()*22;
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = size + 'px';
    h.style.setProperty('--drift', (Math.random()*80-40) + 'px');
    const duration = 8 + Math.random()*8;
    h.style.animationDuration = duration + 's';
    bgHearts.appendChild(h);
    setTimeout(()=>h.remove(), duration*1000);
  }
  setInterval(spawnHeart, 400);
  for(let i=0;i<10;i++) setTimeout(spawnHeart, i*200);

  function burstHearts(count){
    for(let i=0;i<count;i++) setTimeout(spawnHeart, i*40);
  }

  // ---------- screen navigation ----------
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ---------- dodging No button ----------
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const dodgeZone = document.getElementById('dodgeZone');
  const hint = document.getElementById('hint');

  const phrases = [
    "Nice try &#128521;",
    "Not so fast!",
    "Catch me if you can &#128168;",
    "Nope, try Yes &#128072;",
    "You can't catch me!",
    "Yes is looking pretty good right now &#128149;",
    "Nuh uh, not today &#128524;",
    "This button has trust issues &#128517;",
    "I'm quicker than your reflexes &#128168;",
    "Denied! Yes is right there &#128064;",
    "Swing and a miss &#128514;",
    "The only way is Yes &#128150;",
    "Error 404: No button not found",
    "Playing hard to get &#128524;",
    "Just say Yes already &#129402;",
    "Running is my cardio today &#127939;&#8205;&#9792;&#65039;",
    "Big Yes energy over here &#128525;",
    "It's Yes o'clock somewhere &#128343;",
    "Sike! Try again &#128123;",
    "My middle name is Dodge &#128123;"
  ];
  let attempts = 0;

  function placeInitial(){
    const w = dodgeZone.clientWidth;
    const h = dodgeZone.clientHeight;
    yesBtn.style.left = (w*0.5 - yesBtn.offsetWidth - 10) + 'px';
    yesBtn.style.top = (h/2 - yesBtn.offsetHeight/2) + 'px';
    // noBtn is position:fixed (roams the whole viewport once threatened),
    // so its initial resting spot is expressed in viewport coordinates
    const zoneRect = dodgeZone.getBoundingClientRect();
    noBtn.style.left = (zoneRect.left + w*0.5 + 10) + 'px';
    noBtn.style.top = (zoneRect.top + h/2 - noBtn.offsetHeight/2) + 'px';
  }
  window.addEventListener('load', placeInitial);
  window.addEventListener('resize', ()=>{ if(attempts === 0) placeInitial(); });

  // dodge to a random spot WITHIN THE WHITE CARD, biased to be far from
  // the given threat coordinate (falls back to pure random if none given)
  const questionCard = dodgeZone.closest('.card');
  function dodge(px, py){
    const margin = 12;
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;
    const cardRect = questionCard.getBoundingClientRect();
    const minX = cardRect.left + margin;
    const minY = cardRect.top + margin;
    const maxX = Math.max(minX, cardRect.right - bw - margin);
    const maxY = Math.max(minY, cardRect.bottom - bh - margin);
    let newX, newY;
    if(typeof px === 'number'){
      let bestX = minX, bestY = minY, bestDist = -1;
      for(let i=0;i<14;i++){
        const cx = minX + Math.random()*(maxX-minX);
        const cy = minY + Math.random()*(maxY-minY);
        const d = Math.hypot(cx-px, cy-py);
        if(d > bestDist){ bestDist = d; bestX = cx; bestY = cy; }
      }
      newX = bestX; newY = bestY;
    } else {
      newX = minX + Math.random()*(maxX-minX);
      newY = minY + Math.random()*(maxY-minY);
    }
    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';
    hint.innerHTML = phrases[attempts % phrases.length];
    attempts++;
    const growth = Math.min(1.4, 1 + attempts*0.04);
    yesBtn.style.transform = 'scale(' + growth + ')';
  }

  // proactively flee as soon as the cursor/finger gets close, well before contact
  const DODGE_RADIUS = 130;
  let lastDodgeAt = 0;
  function threatCheck(clientX, clientY){
    if(!document.getElementById('screen-question').classList.contains('active')) return;
    const rect = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const dist = Math.hypot(clientX-cx, clientY-cy);
    const now = Date.now();
    if(dist < DODGE_RADIUS && now - lastDodgeAt > 100){
      lastDodgeAt = now;
      dodge(clientX, clientY);
    }
  }
  document.addEventListener('mousemove', (e)=> threatCheck(e.clientX, e.clientY));
  document.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    if(t) threatCheck(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchmove', (e)=>{
    const t = e.touches[0];
    if(t) threatCheck(t.clientX, t.clientY);
  }, {passive:true});

  // last-resort fallbacks in case a pointer somehow still lands on it
  noBtn.addEventListener('mouseenter', ()=> dodge());
  noBtn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); dodge(); });
  noBtn.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); dodge(); });
  noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); }, {passive:false});

  yesBtn.addEventListener('click', ()=>{
    burstHearts(24);
    showScreen('screen-yey');
  });

  // ---------- date screen ----------
  document.getElementById('toDateBtn').addEventListener('click', ()=>{
    showScreen('screen-date');
  });

  const dateInput = document.getElementById('dateInput');
  const toEventBtn = document.getElementById('toEventBtn');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.addEventListener('input', ()=>{
    toEventBtn.disabled = !dateInput.value;
  });
  toEventBtn.addEventListener('click', ()=>{
    showScreen('screen-event');
  });

  // ---------- event screen ----------
  let chosenEvent = null;
  const eventCards = document.querySelectorAll('.event-card');
  const lockInBtn = document.getElementById('lockInBtn');
  eventCards.forEach(card=>{
    card.addEventListener('click', ()=>{
      eventCards.forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      chosenEvent = card.dataset.event;
      lockInBtn.disabled = false;
    });
  });

  // notify Tino via ntfy.sh when Lucia locks in the plan
  const NTFY_TOPIC = 'datenotes1241';
  function sendLockInNotification(formattedDate, event){
    fetch('https://ntfy.sh/' + NTFY_TOPIC, {
      method: 'POST',
      body: 'lucia — ' + formattedDate + ' — ' + event
    }).catch(()=>{ /* no internet / blocked — page still works fine without it */ });
  }

  lockInBtn.addEventListener('click', ()=>{
    burstHearts(30);
    const d = new Date(dateInput.value + 'T00:00:00');
    const formatted = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    document.getElementById('summaryText').textContent = formatted + ' — ' + chosenEvent;
    sendLockInNotification(formatted, chosenEvent);
    showScreen('screen-final');
  });
</script>
</body>
</html>
